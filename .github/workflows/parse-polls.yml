name: Parse poll tables

on:
  push:
    paths:
      - 'raw_tables/**'
  workflow_dispatch:  # lets you trigger it manually from the Actions tab too

jobs:
  parse:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Parse every xlsx in raw_tables/ and push to the review sheet
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          python scripts/pollparse/process_raw_tables.py \
            --aliases scripts/pollparse/crosstab_aliases.json \
            --collapse-rules scripts/pollparse/collapse_rules.json \
            --party-order scripts/pollparse/party_order.json \
            --question-labels scripts/pollparse/question_labels.json

      - name: Open a PR with the new/updated archive rows
        if: always()
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Parse new poll table(s)"
          branch: "poll-import/${{ github.run_id }}"
          title: "New poll data ready for review"
          body: |
            Auto-generated from files in `raw_tables/`.
            Anything flagged (overflow, NET-mismatch, unreordered party tables)
            is visible in the `flags` column of the Review sheet, and in this
            run's log output -- worth a glance there before merging this CSV.
